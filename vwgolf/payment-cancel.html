<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento Cancelado - VW Golf</title>
  <link rel="stylesheet" href="payment.css">
  <style>
    .cancel-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }

    .cancel-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .cancel-container h1 {
      color: #e74c3c;
      margin-bottom: 10px;
    }

    .cancel-container p {
      font-size: 16px;
      margin-bottom: 30px;
      color: #555;
    }

    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .button {
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
      transition: background-color 0.3s;
    }

    .button-primary {
      background-color: #3498db;
      color: white;
    }

    .button-primary:hover {
      background-color: #2980b9;
    }

    .button-secondary {
      background-color: #95a5a6;
      color: white;
    }

    .button-secondary:hover {
      background-color: #7f8c8d;
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="topbar">
      <a class="back" href="/vwgolf/home.html">← Voltar</a>
      <div class="brand">Pagamento VW Golf</div>
    </header>

    <div class="cancel-container">
      <div class="cancel-icon">❌</div>
      <h1>Pagamento Cancelado</h1>
      <p>O seu pagamento foi cancelado. Nenhuma transação foi processada.</p>
      <p>Se foi um erro, pode tentar novamente.</p>

      <div class="button-group">
        <a href="javascript:history.back()" class="button button-primary">Tentar Novamente</a>
        <a href="/vwgolf/home.html" class="button button-secondary">Voltar à Loja</a>
      </div>
    </div>
  </main>
</body>

</html>
