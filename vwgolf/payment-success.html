<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento Confirmado - VW Golf</title>
  <link rel="stylesheet" href="payment.css">
  <style>
    .success-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }

    .success-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .success-container h1 {
      color: #27ae60;
      margin-bottom: 10px;
    }

    .success-container p {
      font-size: 16px;
      margin-bottom: 30px;
      color: #555;
    }

    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .button {
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
      transition: background-color 0.3s;
    }

    .button-primary {
      background-color: #27ae60;
      color: white;
    }

    .button-primary:hover {
      background-color: #229954;
    }

    .button-secondary {
      background-color: #95a5a6;
      color: white;
    }

    .button-secondary:hover {
      background-color: #7f8c8d;
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="topbar">
      <a class="back" href="/vwgolf/home.html">← Voltar</a>
      <div class="brand">Pagamento VW Golf</div>
    </header>

    <div class="success-container">
      <div class="success-icon">✅</div>
      <h1>Pagamento Confirmado!</h1>
      <p>O seu pagamento foi processado com sucesso. Obrigado pela sua compra!</p>
      <p>Recebeu um e-mail de confirmação com os detalhes da sua encomenda.</p>

      <div class="button-group">
        <a href="/vwgolf/home.html" class="button button-primary">Voltar à Loja</a>
        <a href="/vwgolf/index.html" class="button button-secondary">Explorar Produtos</a>
      </div>
    </div>
  </main>
</body>

</html>
