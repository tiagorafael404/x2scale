  <script> 
    const buyLink = document.getElementById('buyLink');
    const optionItems = document.querySelectorAll('.options_list li');
    let selectedOption = null;

    optionItems.forEach(item => {
      item.addEventListener('click', event => {
        event.preventDefault();
        selectedOption = item.id;

        optionItems.forEach(li => li.classList.remove('selected'));
        item.classList.add('selected');

        if (selectedOption === '1') {
          buyLink.href = 'https://www.youtube.com';
        } else if (selectedOption === '2') {
          buyLink.href = 'https://www.google.com';
        } else {
          buyLink.href = 'https://buy.stripe.com/28o03A1IYbGRbBK28b';
        }
      });
    });
  </script>
